name: Docs check

on:
  pull_request:
    branches: [main]

concurrency:
  group: dox-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: dox check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Lints content (orphans, frontmatter), validates internal links + anchors,
      # and validates the OpenAPI spec. Emits GitHub annotations; fails on errors.
      - name: dox check
        run: npx --yes create-dox@latest check --ci .
